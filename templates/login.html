{% extends "base.html" %}
{% block title %}Login — Rising Waters{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm rw-auth-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-water text-primary display-5"></i>
                    <h4 class="fw-bold mt-2">Welcome Back</h4>
                    <p class="text-muted small">Log in to access the flood prediction system.</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}" id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="email">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Your password" required autocomplete="current-password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted small mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
