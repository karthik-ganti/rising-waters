{% extends "base.html" %}
{% block title %}Register — Rising Waters{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm rw-auth-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-water text-primary display-5"></i>
                    <h4 class="fw-bold mt-2">Create Account</h4>
                    <p class="text-muted small">Join the flood prediction platform.</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}" id="registerForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="name">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="Dr. Jane Smith" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="email">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="role">Role</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                            <select class="form-select" id="role" name="role">
                                <option value="Meteorologist">Meteorologist</option>
                                <option value="Disaster Management Officer">Disaster Management Officer</option>
                                <option value="Local Authority">Local Authority</option>
                                <option value="Government Analyst">Government Analyst</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted small mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Log in here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
